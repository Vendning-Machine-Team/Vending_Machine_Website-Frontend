<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>

  <!-- This was originally payment page, is now the new "start page" -->

  <script type="module" crossorigin src="../assets/adminDashboard-D6CC03Pu.js"></script>
  <link rel="modulepreload" crossorigin href="../assets/style-D8odUd8i.js">
  <link rel="stylesheet" crossorigin href="../assets/style-DJwHEuAg.css">
</head>


<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-300 to-sky-200">
    
<!--this is the box with everything-->
    <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.12)] p-10 w-full max-w-lg">
      
      <h1 class="text-4xl font-semibold text-gray-900 tracking-tight text-center">
        Admin Page Options
      </h1>

      <div class="mt-10 space-y-4">
        <button id="setPathButton" class="w-full bg-blue-400 hover:bg-blue-500 text-white py-4 rounded-2xl font-semibold transition shadow-md">
          Set Path
        </button>
        <button id="setInventoryButton" class="w-full bg-indigo-400 hover:bg-indigo-500 text-white py-4 rounded-2xl font-semibold transition shadow-md">
          Set Inventory
        </button>
        <button id="viewActionsButton" class="w-full bg-violet-400 hover:bg-violet-500 text-white py-4 rounded-2xl font-semibold transition shadow-md">
          View Actions
        </button>
        <button id="sendRobotTestButton" type="button" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-4 rounded-2xl font-semibold transition shadow-md">
          Send test message to robot
        </button>
        <p id="robotTestStatus" class="text-center text-sm text-gray-600 min-h-[1.25rem]" aria-live="polite"></p>
        <button id="logOutButton" class="w-full bg-red-400 hover:bg-red-500 text-white py-4 rounded-2xl font-semibold transition shadow-md">
          Log Out
        </button>
      </div>
    </div>


</body>
</html>

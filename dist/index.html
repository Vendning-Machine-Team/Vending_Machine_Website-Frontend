<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pay For Snacks</title>

  <script type="module" crossorigin src="./assets/main-C8A903-O.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/style-_gm7ZM6v.js">
  <link rel="stylesheet" crossorigin href="./assets/style-BG7RjkrG.css">
</head>

<body class="min-h-screen relative bg-gradient-to-br from-purple-300 to-pink-200">
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="relative bg-white/80 backdrop-blur-xl rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.12)] p-10 w-full max-w-5xl">

      <a
        href="./pages/adminLogin.html"
        class="absolute top-6 right-6 text-sm font-medium text-gray-500 hover:text-gray-900 transition bg-white/70 px-4 py-2 rounded-xl shadow-sm"
      >
        Admin Login
      </a>

      <h1 class="text-4xl font-semibold text-gray-900 tracking-tight text-center">
        Pay for Snacks
      </h1>



      <div id="productContainer" class="mt-8 grid [grid-template-columns:repeat(auto-fit,minmax(220px,1fr))] gap-6"></div>

      <div class="mt-8 text-center">
        <p class="text-xs uppercase tracking-wide text-gray-500">
          Total
        </p>
        <p id="total" class="text-4xl font-bold text-gray-900 mt-1">
          $10
        </p>
      </div>

      <div class="mt-10 space-y-2">
        <button id="payButton" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-4 rounded-2xl font-semibold transition shadow-md">
          Pay Now
        </button>
        
        <button id="reportButton" class="w-full bg-red-400 hover:bg-red-500 text-white py-4 rounded-2xl font-semibold transition shadow-md">
          Report an issue
        </button>
      </div>
    </div>
  </div>
</body>
</html>

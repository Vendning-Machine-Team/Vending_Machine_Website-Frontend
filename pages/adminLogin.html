<!DOCTYPE html>
<html lang="en">
  
<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login</title>
  <link rel="stylesheet" href="/src/style.css">
<script type="module" src="/src/js/adminLoginPage.js" ></script>

</head><!--this is the home button top right corner-->
<body class="min-h-screen relative bg-gradient-to-br from-blue-300 to-sky-200">
    <a
    href="../index.html"
    class="absolute top-6 right-6 text-sm font-medium text-gray-600 hover:text-gray-900 transition">
    Home
  </a>
<!--this is the box with everything-->
  <div class="min-h-screen flex items-center justify-center">
    <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.12)] p-10 w-full max-w-lg">
      
      <h1 class="text-4xl font-semibold text-gray-900 tracking-tight text-center pb-6">
        Administrative Login
      </h1>
      <!--form to login (not currently working)-->
      <label class="block text-sm font-medium text-gray-700 mb-1 pb-2">
        Username
      </label>

      <form class="space-y-2">
      <input
        type="text"
        placeholder="Username"
        class="w-full px-5 py-4 rounded-2xl border border-gray-200 text-center text-xl focus:ring-2 focus:ring-blue-400 outline-none transition"
        required
        />
      <label class="block text-sm font-medium text-gray-700 mb-1 pb-2">
        Password
      </label>

      <input
        type="password"
        placeholder="Password"
        class="w-full px-5 py-4 rounded-2xl border border-gray-200 text-center text-xl focus:ring-2 focus:ring-blue-400 outline-none transition"
        required
        />
        

      <div class="mt-10">
        <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-4 rounded-2xl font-semibold transition shadow-md">
          Login!
        </button>
        </form>
      </div>
    </div>

  </div>

</body>
</html>

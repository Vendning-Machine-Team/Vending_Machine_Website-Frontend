<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard </title>

  <!-- This was originally payment page, is now the new "start page" -->
  <link rel="stylesheet" href="/src/style.css">

  <script type="module" src="/src/js/viewActions.js"></script>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-300 to-sky-200">
    
<!--this is the box with everything-->
    <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.12)] p-10 w-full max-w-lg">
      
      <h1 class="text-4xl font-semibold text-gray-900 tracking-tight text-center">

      </h1>

      <div class="mt-10 space-y-4">
        <textarea readonly id="actions" name="actions" rows="15" cols="200"
        class="w-full px-5 py-4 rounded-2xl border border-gray-200 text-center text-xl focus:ring-2 focus:ring-purple-400 outline-none transition"></textarea>
    </div>
     <button id="homeButton" class="w-full bg-blue-400 hover:bg-blue-500 text-white py-4 rounded-2xl font-semibold transition shadow-md">
            Home
        </button>
    </div>

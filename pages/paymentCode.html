<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pay For Snacks</title>

  <!-- This was originally payment page, is now the new "start page" -->

<body class="min-h-screen relative bg-gradient-to-br from-purple-300 to-pink-200">

  <div class="min-h-screen flex items-center justify-center">

      <h1 class="text-4xl font-semibold text-gray-900 tracking-tight text-center">

      <h2 class="block text-xl uppercase tracking-wide text-gray-900 mt-8 mb-2 text-center">

        <button id="homeButton" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-4 rounded-2xl font-semibold transition shadow-md">
          Home
        </button>
        
        <button id="reportButton" class="w-full bg-red-400 hover:bg-red-500 text-white py-4 rounded-2xl font-semibold transition shadow-md">
